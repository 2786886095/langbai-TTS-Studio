name: Windows build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-package:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            frontend/package-lock.json

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install uv
        run: python -m pip install uv

      - name: Install project dependencies
        shell: pwsh
        run: |
          uv venv --python 3.12 backend/.venv
          uv pip install --python backend/.venv/Scripts/python.exe -r backend/requirements-dev.txt
          npm ci
          npm --prefix frontend ci

      - name: Verify backend and product contracts
        shell: pwsh
        run: |
          Push-Location backend
          .venv/Scripts/python.exe -m pytest tests -q
          Pop-Location
          backend/.venv/Scripts/python.exe -m pytest tests/acceptance -q --require-implementation --prepackage

      - name: Verify frontend
        shell: pwsh
        run: |
          npm --prefix frontend run build
          Push-Location frontend
          npx tsc --noEmit
          Pop-Location

      - name: Build Windows installer
        shell: pwsh
        run: npm run build

      - name: Verify packaged process cleanup
        shell: pwsh
        run: backend/.venv/Scripts/python.exe -m pytest tests/acceptance/test_packaged_cleanup.py -q --packaged-evidence --packaged-exe="dist/win-unpacked/langbai-TTS-Studio.exe"

      - uses: actions/upload-artifact@v7
        with:
          name: langbai-TTS-Studio-windows-${{ github.run_number }}
          path: |
            dist/*.exe
            dist/*.blockmap
            dist/latest.yml
          if-no-files-found: error
          retention-days: 14
